name: Feature request
description: Propose a new rule, flag, format, or enhancement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap or pain point is this addressing? What does today's workflow look like?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Concrete shape of the change. For new rules, include the regex/glob and a sample fixture.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
