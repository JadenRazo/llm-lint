# Example .llmlint.yaml — drop at your repo root and customize.
# Every key is optional. Defaults are sensible.

version: 1

# Filter to specific categories. Omit for "all".
# categories:
#   - claude
#   - cursor
#   - copilot
#   - aider
#   - continue
#   - codeium
#   - windsurf
#   - generic

# Per-rule overrides
rules:
  # Bump info → warning
  # LLM013:
  #   severity: warning
  # Disable a rule
  # LLM004:
  #   enabled: false

# Paths to skip (gitignore-style globs)
ignore:
  - "vendor/**"
  - "node_modules/**"
  - "**/*.min.js"
  - "**/*.min.css"
  - "testdata/**"

# Scan modes
scan:
  filesystem: true
  git_history: true
  git_history_depth: 1000   # 0 = full history

# Auto-fix policy used by `llm-lint scan --fix` and previewed by
# `llm-lint scan --fix-preview`.
# Use "scanned" only when you intentionally want to rewrite matching commits
# in the scanned HEAD history.
# fix:
#   git_history: latest            # none | latest | scanned

# Baselining: snapshot accepted findings, gate CI on new ones.
# baseline:
#   path: .llmlint-baseline.yaml   # default
#   stale_action: warn             # warn | fail | ignore  (warn by default)
#   include_snippets: true         # set false to keep match text out of VCS

# Exit-code threshold
fail_on: error              # error | warning | info | none
